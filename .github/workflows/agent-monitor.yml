# Auto-generated by HUGO spec-to-repo pipeline.
# Unlocks dependent issues when their prerequisites are closed.
# Marks draft PRs as ready when the Copilot coding agent finishes.
#
# Companion workflows handle other concerns:
#   auto-dispatch.yml      — routes agent:ready issues to repo-assist
#   repo-assist.yml        — implements issues via Copilot CLI
#   pr-review-agent.yml    — reviews PRs and posts [FDE-VERDICT]
#   pipeline-watchdog.yml  — detects stalled work and retries
#
# All list endpoints use github.paginate() to handle repos with 100+ items.

name: Agent Monitor — Unlock Dependents & Undraft PRs

on:
  issues:
    types: [closed]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ── Job 1: Unlock dependent issues when a prerequisite closes ──────────
  # CRITICAL: Uses COPILOT_TOKEN (PAT) instead of GITHUB_TOKEN so that
  # the agent:ready label addition triggers auto-dispatch.yml.
  # Events created by GITHUB_TOKEN do NOT trigger other workflow runs.
  unlock-dependents:
    if: github.event_name == 'issues' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Scan and unlock dependents
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const closedNumber = context.payload.issue.number;
            core.info("Issue #" + closedNumber + " closed — scanning dependents");

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            const depPattern = /- Depends on: #(\d+)/g;
            const unlocked = [];

            for (const issue of openIssues) {
              if (!issue.body) continue;

              const deps = [...issue.body.matchAll(depPattern)].map(
                (m) => parseInt(m[1], 10),
              );
              if (!deps.includes(closedNumber)) continue;

              core.info("Issue #" + issue.number + " depends on #" + closedNumber);

              // Check whether ALL dependencies are now closed.
              let allResolved = true;
              for (const depNum of deps) {
                if (depNum === closedNumber) continue;
                const depResp = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: depNum,
                });
                if (depResp.data.state !== "closed") {
                  core.info("  Dep #" + depNum + " still open — skipping");
                  allResolved = false;
                  break;
                }
              }

              if (!allResolved) continue;

              const hasLabel = issue.labels.some((l) => l.name === "agent:ready");
              if (hasLabel) {
                core.info("  #" + issue.number + " already has agent:ready");
                continue;
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ["agent:ready"],
              });
              core.info("  Added agent:ready to #" + issue.number);
              unlocked.push(issue.number);
            }

            core.info("Unlocked " + unlocked.length + " issues");

  # ── Job 2: Mark Copilot draft PRs as ready after agent finishes ────────
  mark-pr-ready:
    if: >-
      github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: mark-pr-ready
      cancel-in-progress: true
    steps:
      - name: Find and undraft completed Copilot PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            const copilotDrafts = prs.filter(
              (pr) =>
                pr.draft &&
                (pr.user.login === "copilot-swe-agent[bot]" ||
                  pr.user.login === "Copilot"),
            );

            if (copilotDrafts.length === 0) {
              core.info("No draft PRs by Copilot found");
              return;
            }

            for (const pr of copilotDrafts) {
              // Copilot prefixes '[WIP]' while still working — skip those.
              if (pr.title.startsWith("[WIP]")) {
                core.info(
                  "PR #" + pr.number + " still has [WIP] prefix — skipping",
                );
                continue;
              }

              core.info("Marking PR #" + pr.number + " as ready for review");
              const mutation = "mutation($id: ID!) { markPullRequestReadyForReview(input: {pullRequestId: $id}) { pullRequest { number isDraft } } }";
              await github.graphql(mutation, { id: pr.node_id });
              core.info("PR #" + pr.number + " marked ready for review");
            }
