# Auto-generated by HUGO spec-to-repo pipeline.
# Converts [FDE-VERDICT] PR comments into formal GitHub reviews
# and arms auto-merge for approved pipeline PRs.
#
# Flow: pr-review-agent posts [FDE-VERDICT] comment on PR →
#       this workflow checks automation-policy →
#       submits formal review → auto-merge triggers.
#
# Identity separation: github-actions[bot] submits the review so
# branch-protection review requirements are satisfied without
# self-approval.
#
# Autonomy policy: if any changed file matches a human_required path
# in automation-policy.yml, approval is blocked until a maintainer
# posts /approve-sensitive.

name: FDE Review Gate — Formal Review & Auto-Merge

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  submit-review:
    # Trigger 1: [FDE-VERDICT] comment on a PR.
    # Trigger 2: /approve-sensitive override command on a PR.
    if: >-
      github.event.issue.pull_request
      && (startsWith(github.event.comment.body, '[FDE-VERDICT]')
          || startsWith(github.event.comment.body, '/approve-sensitive'))
    runs-on: ubuntu-latest
    steps:
      # ── Parse verdict or override ────────────────────────────────── #
      - name: Parse verdict
        id: verdict
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body;
            const prNumber = context.payload.issue.number;
            const isOverride = body.startsWith("/approve-sensitive");

            if (isOverride) {
              core.setOutput("verdict", "OVERRIDE");
              core.setOutput("pr_number", String(prNumber));
              return;
            }

            const approveMatch = body.match(/\*\*VERDICT:\s*APPROVE\*\*/i);
            const rejectMatch = body.match(/\*\*VERDICT:\s*REQUEST_CHANGES\*\*/i);

            if (approveMatch) {
              core.setOutput("verdict", "APPROVE");
            } else if (rejectMatch) {
              core.setOutput("verdict", "REQUEST_CHANGES");
            } else {
              core.warning(
                "[FDE-VERDICT] marker found but no APPROVE / " +
                "REQUEST_CHANGES verdict detected — skipping"
              );
              core.setOutput("verdict", "UNKNOWN");
              return;
            }

            core.setOutput("pr_number", String(prNumber));

      # ── Check autonomy policy for sensitive paths ────────────────── #
      - name: Checkout for policy file
        if: >-
          steps.verdict.outputs.verdict == 'APPROVE'
          || steps.verdict.outputs.verdict == 'OVERRIDE'
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/automation-policy.yml
          sparse-checkout-cone-mode: false

      - name: Check sensitive paths
        if: steps.verdict.outputs.verdict == 'APPROVE'
        id: policy
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const prNumber = parseInt(
              "${{ steps.verdict.outputs.pr_number }}", 10
            );

            // Load automation policy.
            const policyPath = ".github/automation-policy.yml";
            let sensitivePatterns = [];
            if (fs.existsSync(policyPath)) {
              const yaml = fs.readFileSync(policyPath, "utf8");

              // Extract paths under human_required entries.
              // Each human_required action can list paths: [glob, ...]
              const pathMatches = yaml.matchAll(
                /^\s+paths:\s*\n((?:\s+-\s+.+\n?)+)/gm
              );
              for (const m of pathMatches) {
                const lines = m[1].split("\n").filter(Boolean);
                for (const line of lines) {
                  const clean = line
                    .replace(/^\s*-\s*["']?/, "")
                    .replace(/["']?\s*$/, "");
                  if (clean) sensitivePatterns.push(clean);
                }
              }
            }

            if (sensitivePatterns.length === 0) {
              core.info("No sensitive path patterns found — allowing");
              core.setOutput("sensitive", "false");
              return;
            }

            // Get changed files in this PR.
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
              }
            );

            // Check each file against sensitive patterns.
            function globToRegex(glob) {
              let re = glob
                .replace(/\./g, "\\.")
                .replace(/\*\*/g, "<<GLOBSTAR>>")
                .replace(/\*/g, "[^/]*")
                .replace(/<<GLOBSTAR>>/g, ".*");
              return new RegExp("^" + re + "$");
            }

            const sensitiveFiles = [];
            for (const file of files) {
              for (const pattern of sensitivePatterns) {
                if (globToRegex(pattern).test(file.filename)) {
                  sensitiveFiles.push(file.filename);
                  break;
                }
              }
            }

            if (sensitiveFiles.length > 0) {
              core.warning(
                "Sensitive files changed: " + sensitiveFiles.join(", ")
              );
              core.setOutput("sensitive", "true");
              core.setOutput(
                "sensitive_files",
                sensitiveFiles.join("\n")
              );
            } else {
              core.setOutput("sensitive", "false");
            }

      # ── Block approval for sensitive changes ─────────────────────── #
      - name: Block — sensitive paths require human approval
        if: >-
          steps.verdict.outputs.verdict == 'APPROVE'
          && steps.policy.outputs.sensitive == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt(
              "${{ steps.verdict.outputs.pr_number }}", 10
            );
            const sensitiveFiles =
              `${{ steps.policy.outputs.sensitive_files }}`;

            const body = [
              "## \u26a0\ufe0f Sensitive Paths Detected",
              "",
              "This PR changes files that require **human approval** per",
              "the automation policy (`.github/automation-policy.yml`).",
              "",
              "### Affected files",
              "",
              sensitiveFiles
                .split("\n")
                .map((f) => "- `" + f + "`")
                .join("\n"),
              "",
              "### How to proceed",
              "",
              "A maintainer must comment `/approve-sensitive` on this PR",
              "to authorize the merge.",
              "",
              "---",
              "<!-- fde-sensitive-block -->",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });

            // Label the PR as needing human review.
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ["needs-human"],
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "needs-human",
                color: "b60205",
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ["needs-human"],
              });
            }

            core.setFailed(
              "Blocked: sensitive files require /approve-sensitive"
            );

      # ── Handle /approve-sensitive override ───────────────────────── #
      - name: Validate override author
        if: steps.verdict.outputs.verdict == 'OVERRIDE'
        id: override
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.comment.user.login;
            const prNumber = parseInt(
              "${{ steps.verdict.outputs.pr_number }}", 10
            );

            // Check if the commenter has write/admin access.
            const { data: perm } =
              await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: author,
              });

            const allowed = ["admin", "write"];
            if (!allowed.includes(perm.permission)) {
              core.setFailed(
                author + " does not have write access — override denied"
              );
              return;
            }

            core.info(
              "Override approved by " + author +
              " (permission: " + perm.permission + ")"
            );
            core.setOutput("approved", "true");

            // Remove needs-human label.
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: "needs-human",
              });
            } catch {
              // Already removed.
            }

      # ── Submit formal review ─────────────────────────────────────── #
      - name: Submit formal review
        if: >-
          (steps.verdict.outputs.verdict == 'APPROVE'
            && steps.policy.outputs.sensitive != 'true')
          || (steps.verdict.outputs.verdict == 'OVERRIDE'
            && steps.override.outputs.approved == 'true')
          || steps.verdict.outputs.verdict == 'REQUEST_CHANGES'
        id: review
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment;
            const prNumber = parseInt(
              "${{ steps.verdict.outputs.pr_number }}", 10
            );
            const verdictRaw = "${{ steps.verdict.outputs.verdict }}";
            const event = verdictRaw === "REQUEST_CHANGES"
              ? "REQUEST_CHANGES"
              : "APPROVE";

            const reviewBody = [
              "## Pipeline Review — " + event,
              "",
              "Formal review submitted automatically from ",
              "[verdict comment](" + comment.html_url + ").",
              "",
              "See the full review details in the linked comment above.",
            ].join("\n");

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: event,
              body: reviewBody,
            });

            core.info(
              "Submitted formal " + event + " review for PR #" + prNumber
            );

      # ── Queue auto-merge ─────────────────────────────────────────── #
      - name: Queue auto-merge for approved PRs
        if: >-
          (steps.verdict.outputs.verdict == 'APPROVE'
            && steps.policy.outputs.sensitive != 'true')
          || (steps.verdict.outputs.verdict == 'OVERRIDE'
            && steps.override.outputs.approved == 'true')
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.verdict.outputs.pr_number }}"

          gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --squash --auto \
            && echo "✅ Auto-merge confirmed for PR #$PR_NUMBER" \
            || echo "ℹ️  Auto-merge already queued or not available"

      # ── Label the PR ─────────────────────────────────────────────── #
      - name: Add verdict label to PR
        if: >-
          steps.verdict.outputs.verdict != 'UNKNOWN'
          && steps.verdict.outputs.verdict != 'OVERRIDE'
        uses: actions/github-script@v7
        with:
          script: |
            const verdict = "${{ steps.verdict.outputs.verdict }}";
            const prNumber = parseInt(
              "${{ steps.verdict.outputs.pr_number }}", 10
            );
            const label = verdict === "APPROVE"
              ? "review:approved"
              : "review:changes-requested";

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch {
              const color = verdict === "APPROVE" ? "0e8a16" : "d73a4a";
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: color,
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [label],
            });
