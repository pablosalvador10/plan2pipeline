# FDE Automation Policy
# Machine-readable boundary definitions for the autonomous agent pipeline.
#
# Workflows and agents reference this file to decide whether to act
# autonomously or pause for human review.  Keep this file up-to-date
# as the project evolves — it is the single source of truth for what
# the pipeline is allowed to do without human intervention.
#
# The pr-review-submit workflow enforces this policy by checking every
# changed file in a PR against the allowed_targets glob patterns.
# Files matching human_required patterns block auto-approval.
#
# Auto-generated by HUGO spec-to-repo pipeline.

version: "1"

defaults:
  unknown_action: human_required
  fail_closed: true

# ── Autonomous actions (no human approval needed) ────────────────────────
# Each action lists allowed_targets — glob patterns of files that
# the agent may create or modify without human approval.

autonomous:
  # Issue lifecycle
  - action: create_branch
    description: "Create feature branches from issues"
  - action: open_draft_pr
    description: "Open draft PRs linking back to issues"
  - action: push_commits
    description: "Push implementation commits to feature branches"
    allowed_targets:
      - "src/**"
      - "lib/**"
      - "app/**"
      - "tests/**"
      - "test/**"
      - "docs/**"
      - "*.md"
      - "*.py"
      - "*.ts"
      - "*.js"
      - "*.json"
      - "*.yaml"
      - "*.yml"
      - "!.github/workflows/**"
      - "!.github/automation-policy.yml"
      - "!infra/**"
  - action: add_labels
    description: "Add or remove labels on issues and PRs"
  - action: close_issue_on_merge
    description: "Close linked issues when PR merges"
  - action: assign_agent
    description: "Assign Copilot coding agent to agent:ready issues"
  - action: unlock_dependents
    description: "Add agent:ready label when dependencies resolve"
  - action: dispatch_agent
    description: "Route agent:ready issues to repo-assist workflow"
  - action: undraft_pr
    description: "Mark draft PRs as ready when agent finishes"

  # CI / repair
  - action: run_ci
    description: "Execute CI checks (lint, test, type-check)"
  - action: retry_ci_failure
    description: "Retry CI failures up to max_repair_attempts"
  - action: post_repair_command
    description: "Post /fde-repair commands on issues for CI failures"

  # Review gate
  - action: submit_formal_review
    description: "Convert [FDE-VERDICT] comments to formal GitHub reviews"
  - action: queue_auto_merge
    description: "Queue squash auto-merge on approved PRs"

  # Monitoring
  - action: update_pipeline_status
    description: "Update the [FDE] Pipeline Status issue"
  - action: detect_stalled_work
    description: "Flag issues with no progress beyond stall threshold"
  - action: watchdog_retry
    description: "Re-dispatch stalled issues (up to max retries)"

# ── Human-required actions (pipeline must pause) ─────────────────────────
# Files matching these patterns always require human review before merge.

human_required:
  - action: modify_workflow
    description: "CI/CD workflow changes need human review"
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  - action: modify_automation_policy
    description: "Changes to this policy file require human review"
    paths:
      - ".github/automation-policy.yml"
  - action: modify_infrastructure
    description: "Infrastructure-as-code changes need human review"
    paths:
      - "infra/**"
      - "pulumi/**"
      - "terraform/**"
      - "bicep/**"
      - "**/Dockerfile"
      - "docker-compose*.yml"
  - action: modify_secrets_config
    description: "Secret and security configuration requires human review"
    paths:
      - ".env*"
      - "**/secrets/**"
      - ".github/secrets/**"
  - action: modify_dependencies
    description: "Package dependency changes require human review"
    paths:
      - "pyproject.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "uv.lock"
      - "requirements*.txt"
  - action: delete_repository
    description: "Repository deletion always requires human confirmation"
  - action: modify_branch_protection
    description: "Branch protection rule changes need human review"
  - action: change_repo_visibility
    description: "Public/private visibility changes need human approval"
  - action: force_push
    description: "Force pushes to any branch are never autonomous"
  - action: merge_without_ci
    description: "Merging PRs that skip CI checks requires human approval"
  - action: create_release
    description: "Release tagging and publishing requires human approval"

# ── Override commands ────────────────────────────────────────────────────
# Humans can override human_required gates with slash commands.

overrides:
  - command: "/approve-sensitive"
    description: "Approve a PR that touches human_required paths"
    requires: "repo admin or CODEOWNERS member"

# ── Guardrails ───────────────────────────────────────────────────────────

guardrails:
  max_repair_attempts: 2
  max_watchdog_retries: 2
  stall_threshold_minutes: 30
  escalation_threshold_minutes: 120
  max_concurrent_agents: 5
  max_pr_size_lines: 400
  require_ci_pass_for_merge: true
  require_formal_review_for_merge: true
  pipeline_healing_enabled: true
