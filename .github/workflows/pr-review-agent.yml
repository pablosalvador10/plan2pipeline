# Auto-generated by HUGO spec-to-repo pipeline.
# Runs Copilot CLI with the pr-review-agent prompt to review PRs.
# Triggered when Copilot opens or undrafts a pull request.
#
# The agent posts an [FDE-VERDICT] comment that pr-review-submit.yml
# converts into a formal GitHub review.
#
# Identity separation: this workflow reviews as the repo owner's
# Copilot session.  pr-review-submit.yml submits the formal review
# as github-actions[bot].
#
# Kill switch: set repository variable FDE_AGENT_ENABLED=false

name: PR Review Agent — Automated Code Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  review:
    # Review pipeline PRs — Copilot-authored or repo-assist branches.
    # Skip QA/review PRs to prevent loops.
    if: >-
      vars.FDE_AGENT_ENABLED != 'false'
      && (github.event.pull_request.user.login == 'copilot-swe-agent[bot]'
        || github.event.pull_request.user.login == 'Copilot'
        || startsWith(github.event.pull_request.head.ref, 'issue-')
        || startsWith(github.event.pull_request.head.ref, 'feat/issue-'))
      && !startsWith(github.event.pull_request.title, 'QA:')
    runs-on: ubuntu-latest
    concurrency:
      group: pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Gather PR context
        id: context
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Get PR diff stats and linked issue.
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json body --jq '.body')

          # Extract linked issue number.
          ISSUE_NUM=$(echo "$PR_BODY" | \
            grep -oiP '(?:fix(?:es)?|close[sd]?|resolve[sd]?)\s+#\K\d+' | \
            head -1)

          ISSUE_BODY=""
          if [ -n "$ISSUE_NUM" ]; then
            ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --repo "$REPO" \
              --json body,title --jq '"# " + .title + "\n" + "\n" + .body')
          fi

          echo "ISSUE_NUM=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

          echo "PR_BODY<<PR_EOF" >> "$GITHUB_OUTPUT"
          echo "$PR_BODY" >> "$GITHUB_OUTPUT"
          echo "PR_EOF" >> "$GITHUB_OUTPUT"

          echo "ISSUE_BODY<<ISSUE_EOF" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_BODY" >> "$GITHUB_OUTPUT"
          echo "ISSUE_EOF" >> "$GITHUB_OUTPUT"

      - name: Read review prompt
        id: prompt
        run: |
          PROMPT=$(cat .github/prompts/pr-review-agent.md 2>/dev/null || echo "")
          echo "PROMPT<<PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "$PROMPT" >> "$GITHUB_OUTPUT"
          echo "PROMPT_EOF" >> "$GITHUB_OUTPUT"

      - name: Run review agent
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          FULL_PROMPT=$(cat <<REVIEW_EOF
          ${{ steps.prompt.outputs.PROMPT }}

          ---

          ## Current Review

          Review PR #${{ github.event.pull_request.number }}:
          "${{ github.event.pull_request.title }}"

          ### PR Description
          ${{ steps.context.outputs.PR_BODY }}

          ### Linked Issue
          ${{ steps.context.outputs.ISSUE_BODY }}

          Post your review as a comment on PR #${{ github.event.pull_request.number }}.
          Your comment MUST start with [FDE-VERDICT].
          REVIEW_EOF
          )

          copilot --prompt "$FULL_PROMPT" \
            --allow-all-tools \
            --allow-all-paths \
            < /dev/null \
            || echo "::warning::Review agent exited with non-zero status"

      - name: Queue auto-merge
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash --auto \
            && echo "Auto-merge queued for PR #${{ github.event.pull_request.number }}" \
            || echo "Auto-merge not available — manual merge required"
