# Auto-generated by HUGO spec-to-repo pipeline.
# Maintains a rolling [FDE] Pipeline Status issue with live metrics
# on the autonomous agent pipeline progress.

name: FDE Pipeline Status

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read

jobs:
  update-status:
    runs-on: ubuntu-latest
    concurrency:
      group: pipeline-status
      cancel-in-progress: true
    steps:
      - name: Gather metrics and update status issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const STATUS_TITLE = "[FDE] Pipeline Status";

            // ── Gather all issues ──────────────────────────────────
            const allIssues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: "all", per_page: 100 },
            );

            // Filter out PRs (GitHub API returns PRs as issues too).
            const issues = allIssues.filter((i) => !i.pull_request);

            // Exclude the status issue itself from metrics.
            const workIssues = issues.filter(
              (i) => i.title !== STATUS_TITLE,
            );

            // ── Categorise ─────────────────────────────────────────
            const total = workIssues.length;
            const closed = workIssues.filter(
              (i) => i.state === "closed",
            ).length;
            const open = total - closed;

            const hasLabel = (i, name) =>
              i.labels.some((l) => l.name === name);

            const ready = workIssues.filter(
              (i) =>
                i.state === "open" && hasLabel(i, "agent:ready"),
            ).length;
            const qaReview = workIssues.filter(
              (i) =>
                i.state === "open" && hasLabel(i, "qa-review"),
            ).length;

            // Issues with open PRs (in progress).
            const openPRs = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: "open", per_page: 100 },
            );
            const prLinkedIssues = new Set();
            for (const pr of openPRs) {
              const body = pr.body || "";
              const matches = [
                ...body.matchAll(
                  /(?:fix(?:es)?|close[sd]?|resolve[sd]?)\s+#(\d+)/gi,
                ),
              ];
              for (const m of matches) {
                prLinkedIssues.add(parseInt(m[1], 10));
              }
            }
            const inProgress = workIssues.filter(
              (i) =>
                i.state === "open" && prLinkedIssues.has(i.number),
            ).length;

            // Blocked = open, not ready, not QA, not in-progress.
            const blocked = open - ready - qaReview - inProgress;
            const pct =
              total > 0
                ? Math.round((closed / total) * 100)
                : 0;

            // ── Build progress bar ─────────────────────────────────
            const barLen = 20;
            const filled = Math.round((pct / 100) * barLen);
            const bar =
              "\u2588".repeat(filled) +
              "\u2591".repeat(barLen - filled);

            // ── Recently completed (last 5) ────────────────────────
            const recentClosed = workIssues
              .filter((i) => i.state === "closed")
              .sort(
                (a, b) =>
                  new Date(b.closed_at).getTime() -
                  new Date(a.closed_at).getTime(),
              )
              .slice(0, 5);

            const recentLines = recentClosed
              .map(
                (i) =>
                  "- #" +
                  i.number +
                  " " +
                  i.title.substring(0, 60),
              )
              .join("\n");

            // ── Stalled issues (assigned, no PR, open > 30 min) ────
            const now = Date.now();
            const STALL_MS = 30 * 60 * 1000;
            const stalled = workIssues.filter((i) => {
              if (i.state !== "open") return false;
              if (!i.assignees || i.assignees.length === 0)
                return false;
              if (prLinkedIssues.has(i.number)) return false;
              const age =
                now - new Date(i.updated_at).getTime();
              return age > STALL_MS;
            });

            const stalledLines =
              stalled.length > 0
                ? stalled
                    .map(
                      (i) =>
                        "- #" +
                        i.number +
                        " " +
                        i.title.substring(0, 60) +
                        " (" +
                        Math.round(
                          (now -
                            new Date(
                              i.updated_at,
                            ).getTime()) /
                            60000,
                        ) +
                        "m idle)",
                    )
                    .join("\n")
                : "_None_";

            // ── Build status body ──────────────────────────────────
            const body = [
              "## FDE Pipeline Status",
              "",
              "\`" + bar + "\` **" + pct + "%** (" + closed + "/" + total + ")",
              "",
              "| Metric | Count |",
              "|--------|-------|",
              "| Total issues | " + total + " |",
              "| Completed | " + closed + " |",
              "| In progress (has PR) | " + inProgress + " |",
              "| Ready (agent:ready) | " + ready + " |",
              "| QA review | " + qaReview + " |",
              "| Blocked (dependencies) | " +
                Math.max(blocked, 0) + " |",
              "| Stalled | " + stalled.length + " |",
              "",
              "### Recently Completed",
              recentLines || "_None yet_",
              "",
              "### Stalled Issues",
              stalledLines,
              "",
              "---",
              "_Updated: " + new Date().toISOString() + "_",
            ].join("\n");

            // ── Create or update the status issue ──────────────────
            const existing = allIssues.find(
              (i) =>
                i.title === STATUS_TITLE &&
                i.state === "open",
            );

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body: body,
              });
              core.info(
                "Updated status issue #" + existing.number,
              );
            } else {
              const created =
                await github.rest.issues.create({
                  owner,
                  repo,
                  title: STATUS_TITLE,
                  body: body,
                  labels: ["pipeline-status"],
                });
              core.info(
                "Created status issue #" +
                  created.data.number,
              );
            }
