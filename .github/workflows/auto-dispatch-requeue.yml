# Auto-generated by HUGO spec-to-repo pipeline.
# Re-queues deferred issues when a repo-assist run completes.
# Ensures the pipeline continues through the dependency graph
# without exceeding the concurrency limit.

name: Auto Dispatch Requeue — Resume Deferred Issues

on:
  workflow_run:
    workflows: ["Repo Assist — Implementation Agent"]
    types: [completed]

permissions:
  issues: write
  actions: write

jobs:
  requeue:
    runs-on: ubuntu-latest
    steps:
      - name: Find and requeue deferred issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Find issues that were deferred due to concurrency limits.
            const deferred = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner, repo,
                state: "open",
                labels: "agent:deferred",
                per_page: 100,
              },
            );

            if (deferred.length === 0) {
              core.info("No deferred issues to requeue");
              return;
            }

            // Check current concurrency.
            const inProgress = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner, repo,
                state: "open",
                labels: "agent:in-progress",
                per_page: 100,
              },
            );

            const MAX_CONCURRENT = 5;
            const available = MAX_CONCURRENT - inProgress.length;

            if (available <= 0) {
              core.info(
                "Still at concurrency limit — no slots available",
              );
              return;
            }

            // Sort by issue number (FIFO) and requeue up to available slots.
            const toRequeue = deferred
              .sort((a, b) => a.number - b.number)
              .slice(0, available);

            for (const issue of toRequeue) {
              // Swap labels: remove deferred, add ready.
              try {
                await github.rest.issues.removeLabel({
                  owner, repo,
                  issue_number: issue.number,
                  name: "agent:deferred",
                });
              } catch { /* label may already be removed */ }

              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: issue.number,
                labels: ["agent:ready"],
              });

              core.info("Requeued issue #" + issue.number);
            }

            core.info(
              "Requeued " + toRequeue.length + " of " +
              deferred.length + " deferred issues",
            );
