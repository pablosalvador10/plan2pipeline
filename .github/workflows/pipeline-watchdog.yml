# Auto-generated by HUGO spec-to-repo pipeline.
# Periodic health check: detect stalled issues, orphan PRs,
# and failed agent runs.  Retries or escalates as needed.
#
# Kill switch: set repository variable FDE_WATCHDOG_ENABLED=false

name: Pipeline Watchdog — Stall Detection & Health Check

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: read

jobs:
  watchdog:
    if: vars.FDE_WATCHDOG_ENABLED != 'false'
    runs-on: ubuntu-latest
    concurrency:
      group: pipeline-watchdog
      cancel-in-progress: true
    steps:
      - name: Detect stalled and orphan work
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const STALL_MINUTES = 30;
            const MAX_RETRIES = 2;

            // ── Stalled issues ──────────────────────────────────────
            const inProgress = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner, repo,
                state: "open",
                labels: "agent:in-progress",
                per_page: 100,
              },
            );

            const now = new Date();
            const stalledIssues = [];

            for (const issue of inProgress) {
              // Check last activity: comments or events.
              const events = await github.rest.issues.listEvents({
                owner, repo,
                issue_number: issue.number,
                per_page: 5,
              });

              const lastEvent = events.data[0];
              const lastActivity = lastEvent
                ? new Date(lastEvent.created_at)
                : new Date(issue.updated_at);

              const minutesSince =
                (now.getTime() - lastActivity.getTime()) / 60000;

              if (minutesSince >= STALL_MINUTES) {
                stalledIssues.push({
                  number: issue.number,
                  title: issue.title,
                  minutes: Math.round(minutesSince),
                });
              }
            }

            core.info(
              "Found " + stalledIssues.length + " stalled issue(s)",
            );

            // Handle stalled issues: retry or escalate.
            for (const stalled of stalledIssues) {
              // Count existing retry comments.
              const comments = await github.paginate(
                github.rest.issues.listComments,
                {
                  owner, repo,
                  issue_number: stalled.number,
                  per_page: 100,
                },
              );

              const retryCount = comments.filter(
                (c) => c.body.includes("<!-- watchdog-retry"),
              ).length;

              if (retryCount >= MAX_RETRIES) {
                // Escalate to human.
                core.info(
                  "Escalating issue #" + stalled.number +
                  " after " + retryCount + " retries",
                );

                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: stalled.number,
                  body: [
                    "## \u26a0\ufe0f Pipeline Watchdog — Escalation",
                    "",
                    "Issue #" + stalled.number +
                    " has been stalled for **" + stalled.minutes +
                    " minutes** after **" + retryCount +
                    " retry attempts**.",
                    "",
                    "Human intervention required.",
                    "",
                    "---",
                    "<!-- watchdog-escalation -->",
                  ].join("\n"),
                });

                // Swap labels.
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo,
                    issue_number: stalled.number,
                    name: "agent:in-progress",
                  });
                } catch { /* label may already be removed */ }

                try {
                  await github.rest.issues.addLabels({
                    owner, repo,
                    issue_number: stalled.number,
                    labels: ["needs-human"],
                  });
                } catch {
                  await github.rest.issues.createLabel({
                    owner, repo,
                    name: "needs-human",
                    color: "b60205",
                    description: "Human intervention needed",
                  });
                  await github.rest.issues.addLabels({
                    owner, repo,
                    issue_number: stalled.number,
                    labels: ["needs-human"],
                  });
                }
              } else {
                // Retry: re-dispatch via repo-assist.
                core.info(
                  "Retrying issue #" + stalled.number +
                  " (attempt " + (retryCount + 1) + ")",
                );

                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: stalled.number,
                  body: [
                    "## Pipeline Watchdog — Retry",
                    "",
                    "Issue stalled for " + stalled.minutes +
                    " minutes. Re-dispatching to repo-assist " +
                    "(attempt " + (retryCount + 1) + "/" +
                    MAX_RETRIES + ").",
                    "",
                    "---",
                    "<!-- watchdog-retry:" + (retryCount + 1) + " -->",
                  ].join("\n"),
                });

                // Re-dispatch.
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo,
                  workflow_id: "repo-assist.yml",
                  ref: "main",
                  inputs: {
                    issue_number: String(stalled.number),
                    mode: "implement",
                  },
                });
              }
            }

            // ── Orphan PRs ──────────────────────────────────────────
            const openPRs = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: "open", per_page: 100 },
            );

            const copilotPRs = openPRs.filter(
              (pr) =>
                pr.user.login === "copilot-swe-agent[bot]" ||
                pr.user.login === "Copilot",
            );

            for (const pr of copilotPRs) {
              const body = pr.body || "";
              const issueMatch = body.match(
                /(?:fix(?:es)?|close[sd]?|resolve[sd]?)\s+#(\d+)/i,
              );

              if (!issueMatch) {
                core.warning(
                  "Orphan PR #" + pr.number +
                  " has no linked issue",
                );
                continue;
              }

              // Check if linked issue is still open.
              try {
                const linked = await github.rest.issues.get({
                  owner, repo,
                  issue_number: parseInt(issueMatch[1], 10),
                });
                if (linked.data.state === "closed") {
                  core.warning(
                    "PR #" + pr.number +
                    " linked to closed issue #" + issueMatch[1],
                  );
                }
              } catch {
                core.warning(
                  "PR #" + pr.number +
                  " linked to non-existent issue #" + issueMatch[1],
                );
              }
            }

            // ── Summary ─────────────────────────────────────────────
            core.info("Watchdog complete:");
            core.info("  In-progress issues: " + inProgress.length);
            core.info("  Stalled issues: " + stalledIssues.length);
            core.info("  Copilot PRs: " + copilotPRs.length);
