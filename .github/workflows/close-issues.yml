# Auto-generated by HUGO spec-to-repo pipeline.
# Closes linked issues when a pull request is merged.
# Defense-in-depth for GitHub's auto-close feature.

name: Close Issues on Merge

on:
  pull_request:
    types: [closed]

permissions:
  issues: write

jobs:
  close-linked-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Close linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";

            // Extract issue numbers from Fixes/Closes/Resolves keywords.
            const pattern = /(?:fix(?:es)?|close[sd]?|resolve[sd]?)\s+#(\d+)/gi;
            const matches = [...body.matchAll(pattern)];
            const issueNumbers = [
              ...new Set(matches.map((m) => parseInt(m[1], 10))),
            ];

            if (issueNumbers.length === 0) {
              core.info("No linked issues found in PR body — skipping");
              return;
            }

            core.info(
              "Found " + issueNumbers.length + " linked issue(s): " +
              issueNumbers.join(", ")
            );

            for (const issueNum of issueNumbers) {
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNum,
                });

                if (issue.data.state === "closed") {
                  core.info("Issue #" + issueNum + " already closed");
                  continue;
                }

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNum,
                  state: "closed",
                  state_reason: "completed",
                });

                // Add a comment linking back to the merged PR.
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNum,
                  body: "Closed by PR #" + pr.number + " (" + pr.html_url + ").",
                });

                core.info("Closed issue #" + issueNum + " via PR #" + pr.number);
              } catch (err) {
                core.warning(
                  "Failed to close issue #" + issueNum + ": " + err.message
                );
              }
            }
