# Auto-generated by HUGO spec-to-repo pipeline.
# Runs Copilot CLI with the repo-assist prompt to implement issues.
# Triggered by auto-dispatch, /fde-repair commands, or CI repair routing.
#
# Three modes:
#   1. implement  — create a new branch and PR from an issue
#   2. ci-repair  — fix CI failures on an existing PR branch
#   3. command    — respond to /fde-repair slash commands
#
# Kill switch: set repository variable FDE_AGENT_ENABLED=false

name: Repo Assist — Implementation Agent

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to implement'
        required: true
        type: string
      mode:
        description: 'Execution mode: implement | ci-repair | command'
        required: false
        default: 'implement'
        type: choice
        options:
          - implement
          - ci-repair
          - command
      pr_number:
        description: 'PR number (for ci-repair mode)'
        required: false
        type: string
      failure_context:
        description: 'CI failure details (for ci-repair mode)'
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-agent:
    if: vars.FDE_AGENT_ENABLED != 'false'
    runs-on: ubuntu-latest
    concurrency:
      group: repo-assist-${{ inputs.issue_number }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Read issue context
        id: issue
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ISSUE_BODY=$(gh issue view "${{ inputs.issue_number }}" \
            --repo "$REPO" --json body,title --jq '
              "# " + .title + "\n\n" + .body
            ')

          echo "ISSUE_BODY<<ISSUE_EOF" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_BODY" >> "$GITHUB_OUTPUT"
          echo "ISSUE_EOF" >> "$GITHUB_OUTPUT"

      - name: Read agent prompt
        id: prompt
        run: |
          PROMPT=$(cat .github/prompts/repo-assist.md 2>/dev/null || echo "")
          echo "PROMPT<<PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "$PROMPT" >> "$GITHUB_OUTPUT"
          echo "PROMPT_EOF" >> "$GITHUB_OUTPUT"

      - name: Build execution prompt
        id: exec
        env:
          MODE: ${{ inputs.mode }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          PR_NUMBER: ${{ inputs.pr_number }}
          FAILURE_CONTEXT: ${{ inputs.failure_context }}
        run: |
          if [ "$MODE" = "ci-repair" ]; then
            MODE_INSTRUCTIONS="MODE: CI Repair.
          Fix the CI failure on PR #$PR_NUMBER.
          Check out the PR branch and apply targeted fixes.

          Failure context:
          $FAILURE_CONTEXT"
          elif [ "$MODE" = "command" ]; then
            MODE_INSTRUCTIONS="MODE: Slash Command Repair.
          A /fde-repair command was posted on issue #$ISSUE_NUMBER.
          Read the repair comment for failure details and fix accordingly."
          else
            MODE_INSTRUCTIONS="MODE: Standard Implementation.
          Implement issue #$ISSUE_NUMBER from scratch."
          fi

          FULL_PROMPT=$(cat <<EXEC_EOF
          ${{ steps.prompt.outputs.PROMPT }}

          ---

          ## Current Task

          $MODE_INSTRUCTIONS

          ## Issue Content

          ${{ steps.issue.outputs.ISSUE_BODY }}

          Repository: ${{ github.repository }}
          Issue: #$ISSUE_NUMBER
          EXEC_EOF
          )

          echo "FULL_PROMPT<<FULL_EOF" >> "$GITHUB_OUTPUT"
          echo "$FULL_PROMPT" >> "$GITHUB_OUTPUT"
          echo "FULL_EOF" >> "$GITHUB_OUTPUT"

      - name: Label issue as in-progress
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --add-label "agent:in-progress" \
            --remove-label "agent:ready" \
            2>/dev/null || true

      - name: Run Copilot agent
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          copilot --prompt "${{ steps.exec.outputs.FULL_PROMPT }}" \
            --allow-all-tools \
            --allow-all-paths \
            < /dev/null \
            || echo "::warning::Copilot agent exited with non-zero status"

      - name: Update issue label on completion
        if: always()
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --remove-label "agent:in-progress" \
            2>/dev/null || true
