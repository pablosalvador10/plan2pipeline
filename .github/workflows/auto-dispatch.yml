# Auto-generated by HUGO spec-to-repo pipeline.
# Routes issues with the agent:ready label to the repo-assist workflow.
# Deterministic dispatcher — no AI, just routing logic.
#
# Flow: issue labeled agent:ready → validate → debounce → dispatch
#
# Kill switch: set repository variable FDE_DISPATCH_ENABLED=false

name: Auto Dispatch — Route Issues to Agents

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  dispatch:
    if: >-
      github.event.label.name == 'agent:ready'
      && vars.FDE_DISPATCH_ENABLED != 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Validate and dispatch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = issue.number;

            core.info("Evaluating issue #" + issueNumber + " for dispatch");

            // 1. Validate: must have the 'pipeline' label.
            const hasPipelineLabel = issue.labels.some(
              (l) => l.name === "pipeline",
            );
            if (!hasPipelineLabel) {
              core.info(
                "Issue #" + issueNumber +
                " lacks 'pipeline' label — skipping dispatch",
              );
              return;
            }

            // 2. Debounce: skip if an open PR already references this issue.
            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const linkedPR = prs.find((pr) => {
              const body = pr.body || "";
              const pattern = new RegExp(
                "(?:fix(?:es)?|close[sd]?|resolve[sd]?)\\s+#" +
                issueNumber + "\\b",
                "i",
              );
              return pattern.test(body);
            });

            if (linkedPR) {
              core.info(
                "Issue #" + issueNumber +
                " already has PR #" + linkedPR.number + " — skipping",
              );

              // Remove agent:ready since work is already in progress.
              try {
                await github.rest.issues.removeLabel({
                  owner, repo,
                  issue_number: issueNumber,
                  name: "agent:ready",
                });
              } catch { /* label may already be removed */ }

              return;
            }

            // 3. Check concurrency: limit active agent runs.
            const inProgressIssues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner, repo,
                state: "open",
                labels: "agent:in-progress",
                per_page: 100,
              },
            );

            const MAX_CONCURRENT = 5;
            if (inProgressIssues.length >= MAX_CONCURRENT) {
              core.info(
                "Concurrency limit reached (" + MAX_CONCURRENT +
                " active) — deferring issue #" + issueNumber,
              );

              // Label as deferred so requeue picks it up later.
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: issueNumber,
                labels: ["agent:deferred"],
              });

              try {
                await github.rest.issues.removeLabel({
                  owner, repo,
                  issue_number: issueNumber,
                  name: "agent:ready",
                });
              } catch { /* label may already be removed */ }

              return;
            }

            // 4. Dispatch repo-assist workflow.
            core.info(
              "Dispatching repo-assist for issue #" + issueNumber,
            );

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: "repo-assist.yml",
              ref: "main",
              inputs: {
                issue_number: String(issueNumber),
                mode: "implement",
              },
            });

            core.info(
              "Dispatched repo-assist for issue #" + issueNumber,
            );
