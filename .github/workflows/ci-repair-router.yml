# Auto-generated by HUGO spec-to-repo pipeline.
# Self-healing CI failure loop: detect failure → extract logs →
# dispatch repo-assist in ci-repair mode → escalate if exhausted.
#
# Kill switch: set repository variable FDE_HEALING_ENABLED=false
# to disable automatic repair routing.

name: FDE CI Repair Router

on:
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["*"]
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: read
  actions: write

jobs:
  route-failure:
    # Only run on failures for Copilot PRs, and only if healing is enabled.
    if: >-
      (github.event.check_suite.conclusion == 'failure'
        || github.event.workflow_run.conclusion == 'failure')
      && vars.FDE_HEALING_ENABLED != 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Identify failing PR and linked issue
        id: identify
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Determine the head SHA from check_suite or workflow_run.
            const headSha =
              context.payload.check_suite?.head_sha ||
              context.payload.workflow_run?.head_sha;

            if (!headSha) {
              core.info("No head SHA found — skipping");
              core.setOutput("should_continue", "false");
              return;
            }

            // Find the PR associated with this SHA.
            const { data: prs } =
              await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                per_page: 30,
              });

            const pr = prs.find((p) => p.head.sha === headSha);
            if (!pr) {
              core.info("No open PR for SHA " + headSha);
              core.setOutput("should_continue", "false");
              return;
            }

            // Only handle Copilot PRs.
            const authorLogin = pr.user?.login || "";
            if (
              authorLogin !== "copilot-swe-agent[bot]" &&
              authorLogin !== "Copilot"
            ) {
              core.info(
                "PR #" +
                  pr.number +
                  " is not a Copilot PR — skipping",
              );
              core.setOutput("should_continue", "false");
              return;
            }

            // Extract linked issue number from PR body.
            const body = pr.body || "";
            const issueMatch = body.match(
              /(?:fix(?:es)?|close[sd]?|resolve[sd]?)\s+#(\d+)/i,
            );
            if (!issueMatch) {
              core.info(
                "PR #" +
                  pr.number +
                  " has no linked issue — skipping",
              );
              core.setOutput("should_continue", "false");
              return;
            }

            core.setOutput("should_continue", "true");
            core.setOutput("pr_number", String(pr.number));
            core.setOutput("issue_number", issueMatch[1]);
            core.setOutput("head_sha", headSha);

      - name: Check repair attempt count
        if: steps.identify.outputs.should_continue == 'true'
        id: check-attempts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = parseInt(
              "${{ steps.identify.outputs.issue_number }}", 10,
            );

            // Count existing ci-repair-command markers.
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: issueNumber, per_page: 100 },
            );

            const repairComments = comments.filter((c) =>
              c.body.includes("ci-repair-command:v1"),
            );
            const attempts = repairComments.length;

            const MAX_ATTEMPTS = 2;
            if (attempts >= MAX_ATTEMPTS) {
              core.info(
                "Issue #" +
                  issueNumber +
                  " has " +
                  attempts +
                  " repair attempts — escalating",
              );
              core.setOutput("action", "escalate");
            } else {
              core.info(
                "Issue #" +
                  issueNumber +
                  " has " +
                  attempts +
                  " repair attempts — retrying",
              );
              core.setOutput("action", "retry");
            }
            core.setOutput("attempt_count", String(attempts));

      - name: Extract failure context
        if: >-
          steps.identify.outputs.should_continue == 'true'
          && steps.check-attempts.outputs.action == 'retry'
        id: extract-context
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = "${{ steps.identify.outputs.head_sha }}";

            // Get failed check runs for this commit.
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: headSha,
              filter: "latest",
              per_page: 50,
            });

            const failures = checkRuns.check_runs.filter(
              (cr) => cr.conclusion === "failure"
            );

            if (failures.length === 0) {
              core.setOutput("failure_context", "No failure details found");
              core.setOutput("failure_type", "unknown");
              return;
            }

            const run = failures[0];
            const summary = run.output?.summary || "";
            const title = run.output?.title || run.name || "Unknown";

            // Classify failure type.
            const text = (summary + " " + title).toLowerCase();
            let failureType = "unknown";
            if (text.includes("lint") || text.includes("format")) {
              failureType = "lint";
            } else if (text.includes("test") || text.includes("pytest")) {
              failureType = "test";
            } else if (text.includes("build") || text.includes("compile") || text.includes("type")) {
              failureType = "build";
            } else if (text.includes("install") || text.includes("dependency")) {
              failureType = "dependency";
            }

            // Build structured context (truncated to 1500 chars).
            const failureContext = [
              "failure_type: " + failureType,
              "check_name: " + run.name,
              "title: " + title,
              "---",
              summary.substring(0, 1200),
            ].join("\n");

            core.setOutput(
              "failure_context",
              failureContext.substring(0, 1500)
            );
            core.setOutput("failure_type", failureType);
            core.setOutput("check_name", run.name);

      - name: Post ci-repair-command marker
        if: >-
          steps.identify.outputs.should_continue == 'true'
          && steps.check-attempts.outputs.action == 'retry'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = parseInt(
              "${{ steps.identify.outputs.issue_number }}", 10,
            );
            const prNumber =
              "${{ steps.identify.outputs.pr_number }}";
            const attempt =
              parseInt(
                "${{ steps.check-attempts.outputs.attempt_count }}",
                10,
              ) + 1;
            const failureType =
              "${{ steps.extract-context.outputs.failure_type }}";
            const checkName =
              "${{ steps.extract-context.outputs.check_name }}";

            const body = [
              "## CI Repair — Attempt " + attempt,
              "",
              "| Field | Value |",
              "|-------|-------|",
              "| PR | #" + prNumber + " |",
              "| Failure type | `" + failureType + "` |",
              "| Check | `" + checkName + "` |",
              "| Attempt | " + attempt + " / 2 |",
              "",
              "Dispatching `repo-assist` in `ci-repair` mode.",
              "",
              "---",
              "<!-- ci-repair-command:v1 attempt:" + attempt + " -->",
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: body,
            });

            // Add repair label.
            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ["ci-repair"],
              });
            } catch {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: "ci-repair",
                color: "d93f0b",
                description: "CI failure under automatic repair",
              });
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ["ci-repair"],
              });
            }

      - name: Dispatch repo-assist in ci-repair mode
        if: >-
          steps.identify.outputs.should_continue == 'true'
          && steps.check-attempts.outputs.action == 'retry'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "repo-assist.yml",
              ref: "main",
              inputs: {
                issue_number: "${{ steps.identify.outputs.issue_number }}",
                mode: "ci-repair",
                pr_number: "${{ steps.identify.outputs.pr_number }}",
                failure_context: `${{ steps.extract-context.outputs.failure_context }}`,
              },
            });

            core.info(
              "Dispatched repo-assist (ci-repair) for issue #" +
                "${{ steps.identify.outputs.issue_number }}"
            );

      - name: Escalate to human review
        if: >-
          steps.identify.outputs.should_continue == 'true'
          && steps.check-attempts.outputs.action == 'escalate'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = parseInt(
              "${{ steps.identify.outputs.issue_number }}", 10,
            );
            const prNumber =
              "${{ steps.identify.outputs.pr_number }}";
            const attempts =
              "${{ steps.check-attempts.outputs.attempt_count }}";

            const body = [
              "## \u26a0\ufe0f Human Review Required",
              "",
              "PR #" +
                prNumber +
                " has failed CI after **" +
                attempts +
                " repair attempts**.",
              "",
              "The autonomous repair loop has been exhausted.",
              "A human must review the failure and intervene.",
              "",
              "### Next Steps",
              "",
              "1. Review PR #" + prNumber + " and its CI logs",
              "2. Fix the issue manually or provide guidance",
              "3. Remove the `ci-repair` and `needs-human` labels when resolved",
              "",
              "---",
              "<!-- fde-escalation -->",
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: body,
            });

            // Add escalation label.
            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ["needs-human"],
              });
            } catch {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: "needs-human",
                color: "b60205",
                description:
                  "Autonomous repair exhausted — human intervention needed",
              });
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ["needs-human"],
              });
            }

            core.info(
              "Escalated issue #" +
                issueNumber +
                " after " +
                attempts +
                " failed repairs",
            );

  resolve-on-success:
    # When CI passes on a PR that was under repair, clean up.
    if: >-
      (github.event.check_suite.conclusion == 'success'
        || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Remove repair labels on CI success
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const headSha =
              context.payload.check_suite?.head_sha ||
              context.payload.workflow_run?.head_sha;

            if (!headSha) return;

            const { data: prs } =
              await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                per_page: 30,
              });

            const pr = prs.find((p) => p.head.sha === headSha);
            if (!pr) return;

            // Check if this PR's linked issue has repair labels.
            const body = pr.body || "";
            const issueMatch = body.match(
              /(?:fix(?:es)?|close[sd]?|resolve[sd]?)\s+#(\d+)/i,
            );
            if (!issueMatch) return;

            const issueNumber = parseInt(issueMatch[1], 10);
            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber,
            });

            const repairLabels = ["ci-repair", "needs-human"];
            const labelsToRemove = issue.data.labels
              .filter((l) => repairLabels.includes(l.name))
              .map((l) => l.name);

            for (const label of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: label,
                });
                core.info(
                  "Removed " +
                    label +
                    " from issue #" +
                    issueNumber,
                );
              } catch {
                // Label may already be removed.
              }
            }

            if (labelsToRemove.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body:
                  "\u2705 CI passed on PR #" +
                  pr.number +
                  " — repair resolved.",
              });
            }
